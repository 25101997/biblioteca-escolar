<form class="form_container" [formGroup]="studentForm" (ngSubmit)="onSubmit()">

    <h2 class="form_title"> 
        <span *ngIf="isEditMode" >Editar</span> 
        <span *ngIf="!isEditMode">Agregar</span> 
        Registro
    </h2>

    <div class="form_section">
    <!-- campo ci -->
        <div class="floating-group">
            <input type="text" formControlName="ci">
            <label for="ci">CI</label>
        </div>

    <!-- campo nombre -->
        <div class="floating-group">
            <input type="text" formControlName="nombre">
            <label for="nombre">Nombre</label>
        </div>

    <!-- campo direccion -->
        <div class="floating-group">
            <input type="text" formControlName="direccion"/>
            <label for="direccion">Direccion</label>
        </div>

    <!-- campo carrera -->
        <div class="floating-group">
            <input type="text" formControlName="carrera">
            <label for="carrera">Carrera</label>
        </div>

    <!-- campo edad -->
        <div class="floating-group">
            <input type="text" formControlName="edad" (keydown)="onlyNumbers($event)" maxlength="3"/>
            <label for="edad">Edad (1 - 200)</label>
        </div>

    </div><!--end class="form_section" -->
    
    <!-- boton para guardar cambios -->
    <button type="submit" 
        class="sqr_rds mt-1" 
        style="display: flex; margin: 0; padding: 0; background-color: transparent; border: 0px transparent;" >
        <img    src="/assets/icons/save_disk.png" 
                alt="" 
                class="sqr_rds" 
                style="width: 5rem; height: 5rem;"
        >
    </button>
</form>
